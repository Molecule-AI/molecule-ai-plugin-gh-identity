name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Canonical plugin validation: spec validation + secret scan, run via
  # the org-wide reusable workflow. Every other Molecule plugin repo
  # uses this; the two Go plugins (this one + github-app-auth) used to
  # skip it because their existing ci.yml only ran Go-specific
  # test/build/vet. That meant a plugin spec misconfig or a committed
  # credential could ship a release without ever being scanned (the
  # security-relevant gap in the publish pipeline).
  validate:
    uses: Molecule-AI/molecule-ci/.github/workflows/validate-plugin.yml@main

  go:
    name: Go build + test + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  shell:
    name: Shellcheck + wrapper tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Shellcheck
        run: shellcheck internal/ghidentity/wrapper.sh scripts/test-wrapper.sh
      - name: Run wrapper tests
        run: bash scripts/test-wrapper.sh
