name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Org-wide secret-scan reusable workflow. Refuses any PR / push whose
  # diff additions contain a recognisable credential. Defense-in-depth
  # for the #2090-class incident — Go-binary plugins were the only
  # subset of the plugin fleet still skipping it (the other ~13 plugin
  # repos use validate-plugin.yml from molecule-ci which bundles the
  # same scan, but validate-plugin.yml is skill/prompt-shaped and
  # doesn't fit Go-binary plugins).
  #
  # Pin to @staging per the canonical pattern documented in the
  # workflow header (staging is the active default branch on
  # molecule-core; main lags via the promotion workflow).
  secret-scan:
    uses: Molecule-AI/molecule-core/.github/workflows/secret-scan.yml@staging

  go:
    name: Go build + test + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  shell:
    name: Shellcheck + wrapper tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Shellcheck
        run: shellcheck internal/ghidentity/wrapper.sh scripts/test-wrapper.sh
      - name: Run wrapper tests
        run: bash scripts/test-wrapper.sh
