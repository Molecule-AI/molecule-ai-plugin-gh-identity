name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Org-wide secret-scan reusable workflow. Refuses any PR / push whose
  # diff additions contain a recognisable credential. Defense-in-depth
  # for the #2090-class incident — kept as a sibling job (rather than
  # nested inside validate-go-plugin) because the secret-scan canonical
  # lives in molecule-core, not molecule-ci. Two top-level uses: blocks
  # beats one nested workflow_call chain.
  #
  # Pin to @staging per the canonical pattern documented in the
  # workflow header (staging is the active default branch on
  # molecule-core; main lags via the promotion workflow).
  secret-scan:
    uses: Molecule-AI/molecule-core/.github/workflows/secret-scan.yml@staging

  # Org-wide Go-plugin gates: go mod tidy clean, build, vet, test
  # -race, gofmt -l, govulncheck. Replaces the inline copy of these
  # steps that lived here before — single source of truth for Go
  # plugin CI lives in molecule-ci/validate-go-plugin.yml.
  validate-go:
    uses: Molecule-AI/molecule-ci/.github/workflows/validate-go-plugin.yml@staging

  # Plugin-specific: shellcheck + behavior tests for the bash wrapper
  # script. Out of scope for the canonical workflow because no other
  # Go plugin in the org ships a wrapper.
  shell:
    name: Shellcheck + wrapper tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Shellcheck
        run: shellcheck internal/ghidentity/wrapper.sh scripts/test-wrapper.sh
      - name: Run wrapper tests
        run: bash scripts/test-wrapper.sh
